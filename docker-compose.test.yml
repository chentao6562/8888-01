# MindLink · ECS 测试服务器 docker-compose
# 单机全栈（API + Web + Postgres + Redis） · 2G RAM 友好
# 使用：docker compose -f docker-compose.test.yml up -d --build

services:
  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    container_name: mindlink-api
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "3000:3000"
    networks: [mindlink]
    mem_limit: 768m
    mem_reservation: 512m

  web:
    build:
      context: .
      dockerfile: infra/docker/admin-web.Dockerfile
      args:
        # 相对路径 · 浏览器同源 · nginx 反代到 api 容器
        VITE_API_BASE: /api/v1
    container_name: mindlink-web
    depends_on:
      - api
    restart: unless-stopped
    ports:
      - "80:80"
    networks: [mindlink]
    mem_limit: 64m

  postgres:
    image: postgres:16-alpine
    container_name: mindlink-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mindlink
      POSTGRES_USER: ${DB_USERNAME:-mindlink}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mindlink_dev}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-mindlink}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [mindlink]
    mem_limit: 384m
    mem_reservation: 256m

  redis:
    image: redis:7-alpine
    container_name: mindlink-redis
    restart: unless-stopped
    command:
      - "redis-server"
      - "--requirepass"
      - "${REDIS_PASSWORD:-mindlink_dev}"
      - "--maxmemory"
      - "128mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
      - "--appendonly"
      - "yes"
    volumes:
      - redis-data:/data
    networks: [mindlink]
    mem_limit: 192m

networks:
  mindlink:
    driver: bridge

volumes:
  pg-data:
  redis-data:
