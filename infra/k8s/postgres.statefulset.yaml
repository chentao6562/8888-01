# 仅供小规模 Beta 使用。生产建议直接使用云厂商托管 PG（腾讯云 TDSQL-C / 阿里云 PolarDB）+ 自动备份。
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: mindlink
spec:
  serviceName: postgres-rw
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: mindlink
            - name: POSTGRES_USER
              valueFrom: { secretKeyRef: { name: mindlink-api-secret, key: DB_USERNAME } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: mindlink-api-secret, key: DB_PASSWORD } }
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits:   { cpu: "2000m", memory: "4Gi" }
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "mindlink"] }
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: [ReadWriteOnce]
        resources: { requests: { storage: 50Gi } }
        storageClassName: standard
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-rw
  namespace: mindlink
spec:
  clusterIP: None
  selector: { app: postgres }
  ports:
    - port: 5432
      targetPort: 5432
