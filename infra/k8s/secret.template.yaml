# 模板：实际部署时通过 kubectl create secret 或云密管注入。
# 严禁把真实凭据 commit 到仓库。
apiVersion: v1
kind: Secret
metadata:
  name: mindlink-api-secret
  namespace: mindlink
type: Opaque
stringData:
  JWT_SECRET: "<change-me-32-chars-or-more>"
  ENCRYPTION_KEY: "<base64 32-byte AES key>"
  DB_USERNAME: "<pg user>"
  DB_PASSWORD: "<pg password>"
  REDIS_PASSWORD: "<redis password>"
  WECHAT_APP_ID: "<wechat appid>"
  WECHAT_APP_SECRET: "<wechat appsecret>"
  FADADA_APP_ID: "<fadada appid>"
  FADADA_APP_SECRET: "<fadada appsecret>"
  LLM_API_KEY: "<dashscope/openai api key>"
  COS_SECRET_ID: "<tencent cos id>"
  COS_SECRET_KEY: "<tencent cos key>"
  SMS_ACCESS_KEY: "<aliyun sms key>"
  SMS_ACCESS_SECRET: "<aliyun sms secret>"
  SENTRY_DSN: "<https://xxx@sentry.io/yyy>"
