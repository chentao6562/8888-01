apiVersion: v1
kind: ConfigMap
metadata:
  name: mindlink-api-config
  namespace: mindlink
data:
  NODE_ENV: "production"
  API_PORT: "3000"
  DB_DRIVER: "postgres"
  DB_HOST: "postgres-rw.mindlink.svc"
  DB_PORT: "5432"
  DB_DATABASE: "mindlink"
  REDIS_HOST: "redis.mindlink.svc"
  REDIS_PORT: "6379"
  CORS_ALLOWED_ORIGINS: "https://app.mindlink.example.com,https://mp.mindlink.example.com"
  WECHAT_PROVIDER: "real"
  ESIGN_PROVIDER: "fadada"
  LLM_PROVIDER: "openai-compat"
  LLM_BASE_URL: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  LLM_MODEL: "qwen-plus"
  SWAGGER_ENABLED: "0"
  ALLOW_DEV_LOGIN: "0"
