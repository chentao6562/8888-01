apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: mindlink
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args:
            - --requirepass
            - $(REDIS_PASSWORD)
            - --maxmemory
            - 512mb
            - --maxmemory-policy
            - allkeys-lru
          env:
            - name: REDIS_PASSWORD
              valueFrom: { secretKeyRef: { name: mindlink-api-secret, key: REDIS_PASSWORD } }
          ports:
            - containerPort: 6379
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "768Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: mindlink
spec:
  selector: { app: redis }
  ports:
    - port: 6379
      targetPort: 6379
