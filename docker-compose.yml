services:
  postgres:
    image: postgres:16-alpine
    container_name: mindlink-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-mindlink}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mindlink_dev}
      POSTGRES_DB: ${DB_DATABASE:-mindlink}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - mindlink_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-mindlink}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mindlink-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - mindlink_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: mindlink-minio
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${OSS_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${OSS_SECRET_KEY:-minioadmin}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - mindlink_minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mindlink_pg_data:
  mindlink_redis_data:
  mindlink_minio_data:
